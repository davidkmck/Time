<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Time</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #818cf8; --dim: #64748b; --urgent: #f43f5e; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; margin: 0; min-height: 100vh; }
        .clock-container { background: var(--card); padding: 40px 20px; border-radius: 24px; text-align: center; width: 100%; max-width: 340px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); box-sizing: border-box; }
        .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--dim); margin-bottom: 5px; }
        .main-time { font-size: 3.5rem; font-weight: bold; color: var(--accent); margin-bottom: 30px; line-height: 1; }
        .secondary-section { border-top: 1px solid #334155; padding-top: 25px; margin-top: 10px; position: relative; }
        .secondary-time { font-size: 2.2rem; font-weight: bold; color: var(--text); margin-bottom: 15px; height: 2.2rem; }
        
        .input-wrapper { position: relative; width: 85%; margin: 0 auto; }
        input { background: transparent; border: none; border-bottom: 1px solid var(--dim); color: var(--text); text-align: center; font-size: 0.9rem; padding: 8px 25px 8px 5px; outline: none; width: 100%; box-sizing: border-box; transition: border-color 0.3s; }
        input:focus { border-bottom-color: var(--accent); }
        
        .clear-btn { position: absolute; right: 0; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--dim); font-size: 1.2rem; cursor: pointer; padding: 5px; display: none; }
        .clear-btn.visible { display: block; }
        
        .date-label { font-size: 0.8rem; color: var(--dim); margin-top: 5px; }
    </style>
</head>
<body>

    <div class="clock-container">
        <div class="label">Local Time</div>
        <div id="localTime" class="main-time">--:--:--</div>
        <div id="localDate" class="date-label">---</div>

        <div class="secondary-section">
            <div class="label" id="cityLabel">Secondary City</div>
            <div id="secondaryTime" class="secondary-time"></div>
            <div class="input-wrapper">
                <input type="text" id="cityInput" placeholder="Enter city (e.g. York)" autocomplete="off">
                <button id="clearBtn" class="clear-btn">×</button>
            </div>
        </div>
    </div>

    <script>
        const cityInput = document.getElementById('cityInput');
        const clearBtn = document.getElementById('clearBtn');
        const localTimeDisplay = document.getElementById('localTime');
        const localDateDisplay = document.getElementById('localDate');
        const secondaryTimeDisplay = document.getElementById('secondaryTime');
        const cityLabel = document.getElementById('cityLabel');

        let matchedZone = "";

        function findBestZone(input) {
            const cleanInput = input.trim().toLowerCase().replace(/\s+/g, '_');
            if (!cleanInput) return null;

            const allZones = Intl.supportedValuesOf('timeZone');
            
            // 1. Exact match on city name
            let match = allZones.find(z => z.split('/').pop().toLowerCase() === cleanInput);
            // 2. Starts with city name
            if (!match) match = allZones.find(z => z.split('/').pop().toLowerCase().startsWith(cleanInput));
            // 3. Includes anywhere
            if (!match) match = allZones.find(z => z.toLowerCase().includes(cleanInput));

            return match;
        }

        function refreshTimes() {
            const now = new Date();
            const rawInput = cityInput.value;
            const cleanedInput = rawInput.trim();

            // Local Time
            localTimeDisplay.innerText = now.toLocaleTimeString([], { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            localDateDisplay.innerText = now.toLocaleDateString([], { weekday: 'long', month: 'short', day: 'numeric' });

            // Toggle Clear Button
            clearBtn.classList.toggle('visible', rawInput.length > 0);

            // Handle Empty Field
            if (cleanedInput === "") {
                secondaryTimeDisplay.innerText = "";
                cityLabel.innerText = "Secondary City";
                matchedZone = "";
                localStorage.removeItem('secondaryCity');
                return;
            }

            // Find match if not already found or if input changed
            matchedZone = findBestZone(cleanedInput);

            if (matchedZone) {
                try {
                    secondaryTimeDisplay.innerText = now.toLocaleTimeString([], { 
                        timeZone: matchedZone, 
                        hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' 
                    });
                    cityLabel.innerText = matchedZone.split('/').pop().replace(/_/g, ' ').toUpperCase();
                    localStorage.setItem('secondaryCity', cleanedInput);
                } catch (e) {
                    secondaryTimeDisplay.innerText = "Error";
                }
            } else {
                secondaryTimeDisplay.innerText = "--:--:--";
                cityLabel.innerText = "No Match Found";
            }
        }

        clearBtn.addEventListener('click', () => {
            cityInput.value = "";
            localStorage.removeItem('secondaryCity');
            refreshTimes();
            cityInput.focus();
        });

        cityInput.addEventListener('input', refreshTimes);

        // Load saved city
        const savedCity = localStorage.getItem('secondaryCity');
        if (savedCity) {
            cityInput.value = savedCity;
        }

        setInterval(refreshTimes, 1000);
        refreshTimes();
    </script>
</body>
</html>
